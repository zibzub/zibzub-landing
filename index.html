<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>zibzub.art</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="zibzub.art">
    <meta property="og:description" content="zibzub.art">
    <meta property="og:url" content="https://zibzub.art/">
    <meta property="og:image" content="https://zibzub.art/img/preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="zibzub.art">
    <meta name="twitter:description" content="zibzub.art">
    <meta name="twitter:image" content="https://zibzub.art/img/preview.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="android-chrome" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #050507;
        color: #eee;
        font-family: system-ui, sans-serif;
      }

      main {
        display: grid;
        grid-template-rows: 1fr 1fr 1fr;
        width: 100%;
        height: 100vh;
        height: 100dvh;
      }

      a {
        display: grid;
        place-items: center;
        min-height: 0;
        overflow: hidden;
      }

      a:focus-visible {
        outline: 4px solid hotpink;
        outline-offset: -4px;
      }

      img {
        height: auto;
        display: block;
      }

      .catmoon {
        background-color: #050507;
        background-image: url("/img/bgstarssmall.png"), url("/img/bgstarslarge.png");
        background-position: center center, center center;
        background-repeat: repeat, repeat;
      }

      .catmoon img {
        width: min(44vh, 42vw, 420px);
      }

      .squish {
        background: #39383f;
      }

      .dao {
        background: #2a2a2a;
      }

      .dao img,
      .squish img {
        width: min(82vw, 82vh, 760px);
      }

      @media (max-width: 700px) {
        .catmoon img {
          width: min(38vh, 76vw);
        }

        .dao img,
        .squish img {
          width: min(90vw, 28vh);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="catmoon" href="https://catmoon.zibzub.art/" aria-label="CatMoon">
        <img src="/img/catmoon.png" alt="CatMoon">
      </a>
      <a class="dao" href="https://doa.zibzub.art/" aria-label="DAO">
        <img src="/img/preview-dao.png" alt="DAO">
      </a>
      <a class="squish" href="https://squish.zibzub.art/" aria-label="Squish">
        <img src="/img/preview-squish.png" alt="Squish">
      </a>
    </main>
  </body>
</html>
