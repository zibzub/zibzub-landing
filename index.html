<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>zibzub.art</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="zibzub.art">
    <meta property="og:description" content="zibzub.art">
    <meta property="og:url" content="https://zibzub.art/">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #050507;
        color: #eee;
        font-family: system-ui, sans-serif;
      }

      main {
        display: grid;
        gap: 30px;
        text-align: center;
      }

      a {
        color: hotpink;
        font-size: 22px;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }
      
      main img {
        max-width: min(640px, 90vw);
        height: auto;
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <main>
      <a href="https://catmoon.zibzub.art/">
        <img src="/img/preview-catmoon.png" alt="CatMoon">
      </a>
      <a href="https://squish.zibzub.art/">
        <img src="/img/preview-squish.png" alt="Squish">
      </a>
    </main>
  </body>
